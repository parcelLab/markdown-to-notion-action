name: "Markdown to Notion"
description: "Syncs Markdown files to Notion pages and updates an index block."
icon: "book"
color: "purple"

inputs:
  notion_token:
    description: "Notion Integration Secret"
    required: true

  docs_folder:
    description: "Path to folder containing markdown files"
    required: false
    default: "docs"

  notion_mapping_file:
    description: "Deprecated and ignored. Sync state is stored in Notion."
    required: false

  page_block_id:
    description: "Anchor block ID/URL used to insert page shortcut links after this block"
    required: false

  page_id:
    description: "Notion page ID where files will be created when page_block_id is not provided"
    required: false

  private_markdown_prefix:
    description: 'Markdown file name prefix to skip from Notion sync. Use "null" to disable.'
    required: false
    default: "_"

  title_prefix_separator:
    description: "Separator for title_prefix folder paths"
    required: false
    default: "→"

  commit_strategy:
    description: "Deprecated and ignored. Sync state is stored in Notion."
    required: false

  pr_branch_prefix:
    description: "Deprecated and ignored. Sync state is stored in Notion."
    required: false

  github_token:
    description: "GitHub token used to read private repository files and file commit timestamps"
    required: false

runs:
  using: "composite"
  steps:
    - name: Set up Node.js runtime
      uses: actions/setup-node@v6
      with:
        node-version: "22"

    - name: Install action dependencies
      run: npm install
      shell: bash
      working-directory: ${{ github.action_path }}

    - name: Run Markdown to Notion sync
      run: npx tsx src/main.ts
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        ACTION_SOURCE_REPOSITORY: ${{ github.action_repository }}
        ACTION_SOURCE_REF: ${{ github.action_ref }}
        INPUT_NOTION_TOKEN: ${{ inputs.notion_token }}
        INPUT_DOCS_FOLDER: ${{ inputs.docs_folder }}
        INPUT_PAGE_BLOCK_ID: ${{ inputs.page_block_id }}
        INPUT_PAGE_ID: ${{ inputs.page_id }}
        INPUT_PRIVATE_MARKDOWN_PREFIX: ${{ inputs.private_markdown_prefix }}
        INPUT_TITLE_PREFIX_SEPARATOR: ${{ inputs.title_prefix_separator }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
